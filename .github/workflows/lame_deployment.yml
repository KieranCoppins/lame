name: "Lame Deployment"

on:
  push:
    tags:
      - 'v*'
    
env:
    PROJECT_NAME: "Lame.Frontend/Lame.Frontend.csproj"
    
jobs:
  deploy:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          
      - name: Restore dependencies
        run: dotnet restore 
        
      - name: Set version
        run: echo "INFORMATIONVERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Build & Publish
        run: dotnet publish ${{ env.PROJECT_NAME }} -c Release --no-restore --self-contained -r win-x64 -o ./publish -p:PublishSingleFile=true -p:InformationalVersion=${{ env.INFORMATIONVERSION }}

      - name: Zip output
        run: Compress-Archive -Path publish/* -DestinationPath lame-${{ github.ref_name }}-win-x64.zip
 
